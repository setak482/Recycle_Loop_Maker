<!-- test.html (프로젝트 루트에 생성) -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Resource Test</title>
  <style>
    body { font-family: sans-serif; padding: 32px; background: #f4f4f4; }
    .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .status { font-weight: bold; margin-left: 8px; }
    .ok  { color: #4caf50; }
    .err { color: #f44336; }
    img  { max-width: 120px; border-radius: 8px; display: block; margin-top: 12px; }
    button { margin-top: 12px; padding: 10px 24px; border: none; border-radius: 8px; background: #555; color: white; cursor: pointer; font-size: 15px; }
    button:hover { background: #333; }
  </style>
</head>
<body>

  <h2>🧪 리소스 테스트</h2>

  <!-- 이미지 테스트 -->
  <div class="card">
    <h3>📷 이미지 <span id="img-status" class="status">확인 중...</span></h3>
    <img
      id="test-img"
      src="/sound/blow_bottle.png"
      alt="blow_bottle"
      onload="setStatus('img-status', true)"
      onerror="setStatus('img-status', false)"
    />
  </div>

  <!-- 오디오 테스트 -->
  <div class="card">
    <h3>🔊 오디오 <span id="audio-status" class="status">확인 중...</span></h3>
    <button onclick="playAudio()">▶ 재생</button>
  </div>

  <script>
    // 이미지 경로 수정
    document.getElementById('test-img').src = '/img/blow_bottle.png';

    function setStatus(id, ok) {
      const el = document.getElementById(id);
      el.textContent = ok ? '✅ OK' : '❌ 로드 실패';
      el.className = 'status ' + (ok ? 'ok' : 'err');
    }

    async function playAudio() {
      const ctx = new AudioContext();
      try {
        const res = await fetch('/sound/blow_bottle.wav');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const buffer = await res.arrayBuffer();
        const decoded = await ctx.decodeAudioData(buffer);
        const source = ctx.createBufferSource();
        source.buffer = decoded;
        source.connect(ctx.destination);
        source.start();
        setStatus('audio-status', true);
      } catch (e) {
        setStatus('audio-status', false);
        console.error(e);
      }
    }
  </script>

  <!-- 기쁨의 송가 테스트 -->
<div class="card">

<script>

  // 6th Octave (C6 ~ B6)
  'C6': 4.000, 'C#6': 4.238, 'Db6': 4.238, 'D6': 4.490, 'D#6': 4.757, 'Eb6': 4.757, 
  'E6': 5.040, 'F6': 5.340, 'F#6': 5.657, 'Gb6': 5.657, 'G6': 5.993, 'G#6': 6.350,

  // 7th Octave (C7 ~ B7)
  'C7': 8.000, 'C#7': 8.476, 'Db7': 8.476, 'D7': 8.980, 'D#7': 9.514, 'Eb7': 9.514, 
  'E7': 10.079, 'F7': 10.679, 'F#7': 11.314, 'Gb7': 11.314, 'G7': 11.986, 'G#7': 12.699,

  // ── 인벤션 8번 시퀀스 [음정, 박자(초)] ────────────────
const S = 0.175;

const INV8_SOPRANO = [
  // m1 — 주제 제시
  [null, 2*S], ['F5', 2*S], ['A5', 2*S], ['F5', 2*S], ['C6', 2*S],['F5',2*S],
  ['F6', 2*S], ['E6', S], ['D6', S], ['C6', S], ['D6',S],['C6',S],['Bb5',S],['A5',S],['Bb5',S],['A5',S],['G5',S],
  ['F5', 2*S], ['A5', 2*S], ['C6', 2*S], ['A5', 2*S], ['F6', 2*S],['C6',2*S],
  ['A6',S],['C7',S],['Bb6',S],['C7',S],['A6',S],['C7',S],['Bb6',S],['C7',S],['A6',S],['C7',S],['Bb6',S],['C7',S],
  ['F6',S],['A6',S],['G6',S],['A6',S],['F6',S],['A6',S],['G6',S],['A6',S],['F6',S],['A6',S],['G6',S],['A6',S],
  ['D6',S],['F6',S],['E6',S],['F6',S],['D6',S],['F6',S],['E6',S],['F6',S],['D6',S],['F6',S],['E6',S],['F6',S],
  ['B5', 2*S], ['G5', 2*S], ['D6', 2*S], ['B5', 2*S], ['F6', 2*S], ['D6',2*S],
  ['G6',S],['A6',S],['G6',S],['F6',S],['E6',S],['F6',S],['E6',S],['D6',S],['C6',S],['D6',S],['C6',S],['Bb5',S],

const INV8_ALTO = [
  // m1 — 소프라노 쉬는 동안 쉼
  ...Array(6).fill([null, 2*S]), // 1마다 쉬고

    [null, 2*S], ['F4', 2*S], ['A4', 2*S], ['F4', 2*S], ['C5', 2*S],['F4',2*S],
    ['F5', 2*S], ['E5', S], ['D5', S], ['C5', S], ['D5',S],['C5',S],['Bb4',S],['A4',S],['Bb4',S],['A4',S],['G4',S],

    ['B4', 2*S], ['G4', 2*S], ['C5', 2*S], ['G4', 2*S], ['E5', 2*S], ['C5',2*S],
    ['F5',S],['G5',S],['F5',S],['E5',S],['D5',S],['E5',S],['D5',S],['C5',S],['B4',S],['C5',S],['B4',S],['A4',S],
    ['G4',2*S],['C5',S],['B4',S],['A4',S],['B4',S],['A4',S],['G4',S],['F4',S],['G4',S],['F4',S],['E4',S],
    ['D4',S],['E4',S],['D4',S],['C4',S],['G4',S],['F4',S],['E4',S],['F4',S],['G4',2*S],['G3',8*S],
    [null,2*S]
];

  async function playOde() {
  const ctx = new AudioContext();
  const res = await fetch('/sound/blow_bottle.wav');
  const decoded = await ctx.decodeAudioData(await res.arrayBuffer());

  // 재사용 가능한 노트 재생 함수
function scheduleSequence(sequence, startTime) {
  let time = startTime;
  for (const [note, duration] of sequence) {
    if (note !== null) {
      if (NOTE_RATE[note] === undefined) {
        console.warn(`NOTE_RATE에 없는 음: ${note}`);  // ← 어떤 음이 없는지 바로 찍힘
      } else {
        const source = ctx.createBufferSource();
        source.buffer = decoded;
        source.playbackRate.value = NOTE_RATE[note];
        source.connect(ctx.destination);
        source.start(time);
        source.stop(time+duration);
      }
    }
    time += duration;
  }
}


  const start = ctx.currentTime + 0.1;
  scheduleSequence(INV8_SOPRANO, start); // 1성부
  scheduleSequence(INV8_ALTO, start);    // 2성부 — 동시 시작
}

<div class="card">
  <h3>📋 JSON 로드 <span id="json-status" class="status">확인 중...</span></h3>
  <pre id="json-output" style="font-size:12px; margin-top:12px;"></pre>
</div>

<script>
  async function loadInstruments() {
    try {
      // 1. 목록 fetch
      const { instruments } = await fetch('/data/instruments.json')
        .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); });

      // 2. 각 악기 개별 fetch (현재는 blow_bottle 하나)
      const details = await Promise.all(
        instruments.map(inst =>
          fetch(`/data/instruments/${inst.id}.json`)
            .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
        )
      );

      setStatus('json-status', true);
      document.getElementById('json-output').textContent
        = JSON.stringify(details, null, 2);

    } catch (e) {
      setStatus('json-status', false);
      console.error(e);
    }
  }

  loadInstruments();
</script>
