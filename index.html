<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RecycLoop</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

  <!-- 메인 그리드 캔버스 -->
  <div id="grid-canvas">
    <div id="grid-world"></div>
  </div>

  <!-- 왼쪽 플로팅 바 -->
  <div id="instrument-panel" class="floating-panel left">
    <button class="panel-toggle">🎵</button>
    <div class="panel-content">
      <p class="panel-label">악기</p>
      <div id="instrument-list"></div>  <!-- 여기에 동적 렌더링 -->
    </div>
  </div>


  <!-- 오른쪽 플로팅 바 -->
  <div id="control-panel" class="floating-panel right">
    <button class="panel-toggle">⚙️</button>
    <div class="panel-content">

      <button id="btn-play" class="play-btn">
        <span id="play-icon">▶</span>
      </button>

      <div class="bpm-control">
        <span id="bpm-label">120 BPM</span>
        <input id="btn-bpm" type="range" min="60" max="200" value="120" />
      </div>

        <div class="subdivision-control">
        <label>
          <input type="radio" name="sub" value="4n"> ♩
        </label>
        <label>
          <input type="radio" name="sub" value="8n" checked> ♪
        </label>
        <label>
          <input type="radio" name="sub" value="16n"> ♬
        </label>
      </div>

    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
