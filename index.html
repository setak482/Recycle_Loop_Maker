<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RecycLoop</title>
  <link rel="stylesheet" href="/src/style/base.css" />
  <link rel="stylesheet" href="/src/style/grid.css" />
  <link rel="stylesheet" href="/src/style/object.css" />
  <link rel="stylesheet" href="/src/style/ui.css" />
  <link rel="stylesheet" href="/src/style/animations.css" />
</head>
<body>

  <!-- 메인 그리드 캔버스 -->
  <div id="grid-canvas">
    <div id="grid-world"></div>
  </div>

  <!-- 왼쪽 플로팅 바 -->
  <div id="instrument-panel" class="floating-panel left">
    <button class="panel-toggle">🎵</button>
    <div class="panel-content">
      <p class="panel-label">악기</p>
      <div id="instrument-list"></div>  <!-- 여기에 동적 렌더링 -->
    </div>
  </div>


  <!-- 오른쪽 플로팅 바 -->
  <div id="control-panel" class="floating-panel right">
    <button class="panel-toggle">⚙️</button>
    <div class="panel-content">

      <div class="control-buttons">
        <button id="btn-play" class="play-btn">
          <span id="play-icon">▶</span>
        </button>
        <button id="btn-save" class="action-btn">저장</button>
        <button id="btn-load" class="action-btn">불러오기</button>
        <button id="btn-reset" class="action-btn">초기화</button>
        <button id="btn-grid" class="action-btn">그리드 끄기</button>
      </div>

      <div class="bpm-control">
        <span id="bpm-label">120 BPM</span>
        <input id="btn-bpm" type="range" min="30" max="200" value="120" />
      </div>

      <div class="volume-control">
        <span id="volume-label">0 dB</span>
        <input id="btn-volume" type="range" min="-80" max="12" value="0" />
      </div>

      <div class="subdivision-control">
        <label>
          <input type="radio" name="sub" value="4n"> ♩
        </label>
        <label>
          <input type="radio" name="sub" value="8n"> ♪
        </label>
        <label>
          <input type="radio" name="sub" value="16n" checked> ♬
        </label>
        <label>
          <input type="radio" name="sub" value="32n"> 32分
        </label>
      </div>
      <input id="load-file-input" type="file" accept="application/json" hidden />

    </div>
  </div>

  <div id="zoom-indicator" class="zoom-indicator" aria-hidden="true">
    <span class="zoom-value">100%</span>
    <div class="zoom-bar">
      <div class="zoom-fill"></div>
    </div>
  </div>

  <div id="mode-toast" class="mode-toast" aria-live="polite"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
